{% set name = "psaps" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/raufs/psaps/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 05ada7f2eba277a65133b1328501b7499fb3d106d206fae58d980e408751e883

build:
  number: 0
  skip: True # [py <= 39]
  run_exports:
    - {{ pin_subpackage('psaps', max_pin='x') }}
    
requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - python
    - setuptools
    - pip
    - wget
  run:
    - python >=3.10
    - biopython >=1.7
    - setuptools
    - pip
    - matplotlib-base
    - seaborn
    - ete3
    - joblib
    - numpy 

test:
  commands:
    - psaps -h

about:
  home: https://github.com/raufs/psaps
  license: BSD-3-Clause license
  license_file: LICENSE
  license_family: BSD
  summary: "Phylogenetically standardized assessment of pangenome fluidity / size"
  dev_url: https://github.com/raufs/psaps

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - raufs
